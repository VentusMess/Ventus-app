<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ventus Messenger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#efefef;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.wrap{text-align:center;padding:24px;max-width:380px;animation:fadeIn .6s ease}
.icon{width:100px;height:100px;margin:0 auto 28px;position:relative}
.face{width:100px;height:100px;border-radius:50%;border:3px solid #333;display:flex;align-items:center;justify-content:center;position:relative}
.eyes{display:flex;gap:18px;margin-bottom:8px}
.eye{width:8px;height:8px;background:#fff;border-radius:50%}
.mouth{width:24px;height:12px;border:3px solid #fff;border-top:none;border-radius:0 0 12px 12px;transform:rotate(180deg)}
.x-mark{position:absolute;top:-8px;right:-8px;width:32px;height:32px;background:#f87171;border-radius:50%;display:flex;align-items:center;justify-content:center}
.x-mark svg{width:16px;height:16px;color:#fff}
h1{font-family:'Courier New',monospace;font-size:28px;letter-spacing:.12em;margin-bottom:6px;font-weight:400}
.sub{font-size:13px;color:#888;letter-spacing:.06em;margin-bottom:32px}
p{font-size:15px;color:#aaa;line-height:1.7;margin-bottom:32px}
.btn{display:inline-block;background:#fff;color:#080808;border:none;border-radius:12px;padding:14px 36px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s}
.btn:active{transform:scale(.96);opacity:.9}
.hint{font-size:11px;color:#555;margin-top:16px}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">
    <div class="face">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        <div class="mouth"></div>
      </div>
    </div>
    <div class="x-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
  </div>
  <h1>VENTUS</h1>
  <div class="sub">MESSENGER</div>
  <p>Для использования мессенджера требуется использовать приложение Ventus Messenger</p>
  <a class="btn" href="#">Скачать приложение</a>
  <div class="hint">Android • Бесплатно</div>
</div>
</body>
</html>
