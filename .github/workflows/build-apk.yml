name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Create google-services.json
        run: |
          cat > android/app/google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "462345718294",
              "project_id": "zero-messenger-898c4",
              "storage_bucket": "zero-messenger-898c4.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:462345718294:android:ef9b2971dfc05510960337",
                  "android_client_info": {
                    "package_name": "com.zero.messenger"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyCc_2y2azGwgbSIlTm9dhEugRknILrsD20"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSEOF
      
      - name: Add server_client_id
        run: |
          sed -i 's|</resources>|    <string name="server_client_id">531705121466-8pd0jorg2bbfik1b0o7o15iodsfhco6k.apps.googleusercontent.com</string>\n</resources>|' android/app/src/main/res/values/strings.xml
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Print SHA1
        run: keytool -printcert -jarfile android/app/build/outputs/apk/debug/app-debug.apk | grep SHA
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ventus-Messenger-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
