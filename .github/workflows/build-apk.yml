name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
      
      - name: Add server_client_id
        run: |
          sed -i 's|</resources>|    <string name="server_client_id">531705121466-8pd0jorg2bbfik1b0o7o15iodsfhco6k.apps.googleusercontent.com</string>\n</resources>|' android/app/src/main/res/values/strings.xml
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Print SHA1
        run: keytool -printcert -jarfile android/app/build/outputs/apk/debug/app-debug.apk | grep SHA
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ventus-Messenger-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
